# ==================== 商品模块配置 ====================
# 
# 模块说明：
# - 提供商品列表、详情、搜索等接口
# - 对应数据库表：products
# - 存储过程前缀：fn_get_product_, fn_search_
#
# API路由：
# - GET /api/product/list     - 获取商品列表（分页）
# - GET /api/product/{id}     - 获取商品详情
# - GET /api/product/search    - 搜索商品

# API路由配置
api:
  routes:
    # 获取商品列表
    - path: /api/product/list
      procedure: get_product_list
      method: GET
      module: product
      description: "获取商品列表"
    
    # 获取商品详情
    - path: /api/product/{id}
      procedure: get_product_by_id
      method: GET
      module: product
      description: "获取商品详情"
    
    # 搜索商品
    - path: /api/product/search
      procedure: search_products
      method: GET
      module: product
      description: "搜索商品"

# 存储过程SQL映射
procedures:
  # 分页获取商品列表
  get_product_list:
    module: product
    sql: "SELECT * FROM fn_get_product_list(?, ?)"
    description: "分页获取商品列表"
  
  # 根据ID获取商品
  get_product_by_id:
    module: product
    sql: "SELECT * FROM fn_get_product_by_id(?)"
    description: "根据ID获取商品"
  
  # 搜索商品
  search_products:
    module: product
    sql: "SELECT * FROM fn_search_products(?, ?, ?)"
    description: "搜索商品"