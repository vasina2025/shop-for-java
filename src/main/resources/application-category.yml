# ==================== 分类模块配置 ====================
# 
# 模块说明：
# - 提供分类查询、分类下商品查询等接口
# - 对应数据库表：categories
# - 存储过程前缀：fn_get_category_
#
# 分类结构：
# - 支持多级分类（parent_id表示父分类）
# - 顶级分类parent_id为NULL
#
# API路由：
# - GET /api/category/tree              - 获取分类树
# - GET /api/category/{id}/products    - 获取分类下的商品

# API路由配置
api:
  routes:
    # 获取分类树
    - path: /api/category/tree
      procedure: get_category_tree
      method: GET
      module: category
      description: "获取分类树"
    
    # 获取分类下的商品
    - path: /api/category/{id}/products
      procedure: get_category_products
      method: GET
      module: category
      description: "获取分类下的商品"

# 存储过程SQL映射
procedures:
  # 获取分类树
  get_category_tree:
    module: category
    sql: "SELECT * FROM fn_get_category_tree()"
    description: "获取分类树形结构"
  
  # 获取分类下的商品
  get_category_products:
    module: category
    sql: "SELECT * FROM fn_get_category_products(?, ?, ?)"
    description: "获取分类下的商品"
