# 商品模块配置

api:
  routes:
    - path: /api/product/list
      procedure: get_product_list
      method: GET
    - path: /api/product/{id}
      procedure: get_product_by_id
      method: GET
    - path: /api/product/search
      procedure: search_products
      method: GET

procedures:
  get_product_list:
    sql: "SELECT * FROM fn_get_product_list(?, ?)"
  get_product_by_id:
    sql: "SELECT * FROM fn_get_product_by_id(?)"
  search_products:
    sql: "SELECT * FROM fn_search_products(?, ?, ?)"
