# 用户模块配置

api:
  routes:
    - path: /api/user/login
      procedure: user_login
      method: POST
    - path: /api/user/register
      procedure: register_user
      method: POST
    - path: /api/user/{id}
      procedure: get_user_by_id
      method: GET
    - path: /api/user/info
      procedure: get_user_by_id
      method: GET

procedures:
  user_login:
    sql: "SELECT * FROM fn_user_login(?, ?)"
  register_user:
    sql: "SELECT * FROM fn_register_user(?, ?, ?, ?)"
  get_user_by_id:
    sql: "SELECT * FROM fn_get_user_by_id(?)"
