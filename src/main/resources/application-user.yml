# ==================== 用户模块配置 ====================
# 
# 模块说明：
# - 提供用户登录、注册、信息查询等接口
# - 对应数据库表：users
# - 存储过程前缀：fn_user_, fn_register_, fn_get_user_
# - 安全：JWT令牌认证
#
# API路由：
# - POST /api/user/login     - 用户登录（返回JWT）
# - POST /api/user/register   - 用户注册（返回JWT）
# - GET /api/user/{id}       - 获取用户信息
# - GET /api/user/info       - 获取当前用户信息

# API路由配置
api:
  routes:
    # 用户登录
    - path: /api/user/login
      procedure: user_login
      method: POST
      module: user
      description: "用户登录"
    
    # 用户注册
    - path: /api/user/register
      procedure: register_user
      method: POST
      module: user
      description: "用户注册"
    
    # 获取用户信息
    - path: /api/user/{id}
      procedure: get_user_by_id
      method: GET
      module: user
      description: "获取用户信息"
    
    # 获取当前用户信息
    - path: /api/user/info
      procedure: get_user_by_id
      method: GET
      module: user
      description: "获取当前用户信息"

# 存储过程SQL映射
procedures:
  # 用户登录验证
  user_login:
    module: user
    sql: "SELECT * FROM fn_user_login(?, ?)"
    description: "用户登录验证"
  
  # 用户注册
  register_user:
    module: user
    sql: "SELECT * FROM fn_register_user(?, ?, ?, ?)"
    description: "用户注册"
  
  # 根据ID获取用户信息
  get_user_by_id:
    module: user
    sql: "SELECT * FROM fn_get_user_by_id(?)"
    description: "根据ID获取用户信息"
  
  # 检查用户名是否存在
  check_username_exists:
    module: user
    sql: "SELECT * FROM fn_check_username_exists(?)"
    description: "检查用户名是否存在"
